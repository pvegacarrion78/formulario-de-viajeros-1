<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Viaje - Puerto Rico Around the World</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff5722;
            --secondary: #00bcd4;
            --dark: #263238;
            --light: #f5f5f5;
            --danger: #d32f2f;
            --success: #009688;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            max-width: 750px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header-banner {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header-banner h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        form {
            padding: 30px;
        }

        fieldset {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            background: white;
        }

        legend {
            font-weight: bold;
            color: var(--dark);
            padding: 0 10px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        label {
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="email"], input[type="date"], input[type="tel"] {
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 8px rgba(0, 188, 212, 0.3);
        }

        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .selection-card {
            position: relative;
            cursor: pointer;
        }

        .selection-card input[type="checkbox"] {
            position: absolute;
            opacity: 0;
        }

        .card-content {
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background-color: #fafafa;
            transition: all 0.3s ease;
            height: 100%;
            justify-content: center;
        }

        .card-content i {
            font-size: 2rem;
            color: #757575;
            transition: all 0.3s ease;
        }

        .card-content span {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark);
        }

        .card-content small {
            font-size: 0.7rem;
            color: #757575;
            display: block;
            line-height: 1.1;
        }

        .destination-section input[type="checkbox"]:checked + .card-content {
            border-color: var(--primary);
            background-color: #fff3e0;
            box-shadow: 0 4px 10px rgba(255, 87, 34, 0.2);
            transform: translateY(-3px);
        }

        .destination-section input[type="checkbox"]:checked + .card-content i {
            color: var(--primary);
        }

        .excursion-section input[type="checkbox"]:checked + .card-content {
            border-color: var(--secondary);
            background-color: #e0f7fa;
            box-shadow: 0 4px 10px rgba(0, 188, 212, 0.2);
            transform: translateY(-3px);
        }

        .excursion-section input[type="checkbox"]:checked + .card-content i {
            color: var(--secondary);
        }

        .passport-danger {
            border-color: var(--danger) !important;
            background-color: #ffebee !important;
            color: var(--danger) !important;
            animation: shake 0.5s ease;
        }

        .warning-text {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
            font-weight: bold;
        }

        .age-display-container {
            background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
            border-left: 5px solid var(--success);
            color: #006064;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .actions-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-submit-airplane {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            border: none;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 131, 176, 0.4);
            transition: all 0.4s ease;
            clip-path: polygon(50% 0%, 100% 50%, 80% 100%, 50% 80%, 20% 100%, 0% 50%);
        }

        .btn-submit-airplane i {
            font-size: 2.2rem;
            transform: rotate(-45deg);
            margin-bottom: 2px;
            transition: transform 0.4s ease;
        }

        .btn-submit-airplane span {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-submit-airplane:hover {
            transform: scale(1.1) translateY(-5px);
            background: linear-gradient(135deg, var(--primary), #e64a19);
            box-shadow: 0 12px 25px rgba(255, 87, 34, 0.5);
        }

        .btn-submit-airplane:hover i {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
        }

        .btn-whatsapp:hover {
            background-color: #128C7E;
            transform: translateY(-2px);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-banner">
        <h1><i class="fa-solid fa-plane-departure"></i> Puerto Rico Around the World</h1>
        <p>Configura tu viaje ideal a tu medida</p>
    </div>

    <form id="travelForm" action="https://formsubmit.co/praroundtheworld2022@gmail.com" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="¡Nueva Inscripción de Pasajero - Puerto Rico Around the World!">

        <fieldset>
            <legend><i class="fa-solid fa-user"></i> Datos Personales</legend>
            <div class="grid">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="Nombre" required placeholder="Ej. Carlos">
                </div>
                <div class="form-group">
                    <label for="apellidos">Apellidos</label>
                    <input type="text" id="apellidos" name="Apellidos" required placeholder="Ej. Rivera">
                </div>
            </div>
            <div class="grid">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="Email" required placeholder="carlos@example.com">
                </div>
                <div class="form-group">
                    <label for="nacimiento">Fecha de Nacimiento</label>
                    <input type="date" id="nacimiento" name="Fecha Nacimiento" required onchange="calcularEdadExacta()">
                    <div id="componenteEdad" class="age-display-container">
                        <i class="fa-solid fa-cake-candles"></i>
                        <span id="edadTexto">Edad: 0 años</span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="direccion">Dirección Residencial</label>
                <input type="text" id="direccion" name="Dirección" required placeholder="Calle, Ciudad, País">
            </div>
        </fieldset>

        <fieldset>
            <legend><i class="fa-solid fa-compass"></i> Preferencias de Aventura</legend>
            
            <label style="display:block; margin-bottom: 5px;">🗺️ Destinos de Interés:</label>
            <div class="selection-grid destination-section">
                <label class="selection-card">
                    <input type="checkbox" name="Destinos[]" value="Europa">
                    <div class="card-content">
                        <i class="fa-solid fa-archway"></i>
                        <span>Europa</span>
                    </div>
                </label>
                <label class="selection-card">
                    <input type="checkbox" name="Destinos[]" value="Asia">
                    <div class="card-content">
                        <i class="fa-solid fa-torii-gate"></i>
                        <span>Asia</span>
                    </div>
                </label>
                <label class="selection-card">
                    <input type="checkbox" name="Destinos[]" value="USA">
                    <div class="card-content">
                        <i class="fa-solid fa-ranking-star"></i>
                        <span>USA</span>
                    </div>
                </label>
                <label class="selection-card">
                    <input type="checkbox" name="Destinos[]" value="América Central">
                    <div class="card-content">
                        <i class="fa-solid fa-volcano"></i>
                        <span>América Central</span>
                        <small>Guatemala, Panamá, Costa Rica...</small>
                    </div>
                </label>
                <label class="selection-card">
                    <input type="checkbox" name="Destinos[]" value="América del Sur">
                    <div class="card-content">
                        <i class="fa-solid fa-mountain-sun"></i>
                        <span>América del Sur</span>
                        <small>Perú, Brasil, Colombia, Argentina...</small>
                    </div>
                </label>
                <label class="selection-card">
                    <input type="checkbox" name="Destinos[]" value="México">
                    <div class="card-content">
                        <i class="fa-solid fa-pepper-hot"></i>
                        <span>México</span>
                    </div>
                </label>
                <label class="selection-card">
                    <input type="checkbox" name="Destinos[]" value="Cruceros">
                    <div class="card-content">
                        <i class="fa-solid fa-ship"></i>
                        <span>Cruceros</span>
                    </div>
                </label>
            </div>

            <label style="display:block; margin-top: 20px; margin-bottom: 5px;">🎒 Tipo de Excursiones:</label>
            <div class="selection-grid excursion-section">
                <label class="selection-card">
                    <input type="checkbox" name="Excursiones[]" value="Aventura">
                    <div class="card-content">
                        <i class="fa-solid fa-person-hiking"></i>
                        <span>Aventura</span>
                    </div>
                </label>
                <label class="selection-card">
                    <input type="checkbox" name="Excursiones[]" value="Historia">
                    <div class="card-content">
                        <i class="fa-solid fa-monument"></i>
                        <span>Historia</span>
                    </div>
                </label>
                <label class="selection-card">
                    <input type="checkbox" name="Excursiones[]" value="Jangueo">
                    <div class="card-content">
                        <i class="fa-solid fa-champagne-glasses"></i>
                        <span>Jangueo / Fiesta</span>
                    </div>
                </label>
                <label class="selection-card">
                    <input type="checkbox" name="Excursiones[]" value="Relajación">
                    <div class="card-content">
                        <i class="fa-solid fa-umbrella-beach"></i>
                        <span>Relajación</span>
                    </div>
                </label>
            </div>
        </fieldset>

        <fieldset>
            <legend><i class="fa-solid fa-passport"></i> Información de Pasaporte</legend>
            <div class="grid">
                <div class="form-group">
                    <label for="pasaporte">Número de Pasaporte</label>
                    <input type="text" id="pasaporte" name="Num_Pasaporte" required placeholder="Ej. E1234567">
                </div>
                <div class="form-group">
                    <label for="expiracion">Fecha de Expiración</label>
                    <input type="date" id="expiracion" name="Expiracion_Pasaporte" required onchange="validarPasaporte()">
                    <div id="pasaporteAlerta" class="warning-text">⚠️ ¡Alerta! El pasaporte expira en menos de 6 meses o está vencido.</div>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend><i class="fa-solid fa-heart-pulse"></i> Información Médica Importante</legend>
            <div class="form-group">
                <label for="alergias">⚠️ ¿Padece de alguna alergia?</label>
                <input type="text" id="alergias" name="Alergias" required placeholder="Ej. Nueces, Penicilina (Si no tiene, escribir: Ninguna)">
            </div>
            <div class="form-group">
                <label for="condiciones">🩺 ¿Tiene alguna condición médica crónica?</label>
                <input type="text" id="condiciones" name="Condiciones_Medicas" required placeholder="Ej. Asma, Diabetes (Si no tiene, escribir: Ninguna)">
            </div>
        </fieldset>

        <fieldset>
            <legend><i class="fa-solid fa-house-medical"></i> Contacto de Emergencia</legend>
            <div class="form-group">
                <label for="nombreEmergencia">Nombre Completo</label>
                <input type="text" id="nombreEmergencia" name="Contacto_Emergencia_Nombre" required placeholder="Ej. Ana Rivera">
            </div>
            <div class="grid">
                <div class="form-group">
                    <label for="telEmergencia">Número de Teléfono</label>
                    <input type="tel" id="telEmergencia" name="Contacto_Emergencia_Tel" required placeholder="Ej. +17871234567">
                </div>
                <div class="form-group">
                    <label for="emailEmergencia">Correo Electrónico</label>
                    <input type="email" id="emailEmergencia" name="Contacto_Emergencia_Email" required placeholder="ana@example.com">
                </div>
            </div>
        </fieldset>

        <div class="actions-container">
            <button type="submit" class="btn-submit-airplane" title="Someter por Correo Electrónico">
                <i class="fa-solid fa-plane"></i>
                <span>Someter</span>
            </button>

            <button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i> Compartir por WhatsApp
            </button>
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const hoy = new Date().toISOString().split("T")[0];
        document.getElementById("nacimiento").setAttribute("max", hoy);
    });

    function calcularEdadExacta() {
        const fechaNacimientoInput = document.getElementById('nacimiento').value;
        const contenedorEdad = document.getElementById('componenteEdad');
        const textoEdad = document.getElementById('edadTexto');

        if (!fechaNacimientoInput) {
            contenedorEdad.style.display = 'none';
            return;
        }

        const fechaNacimiento = new Date(fechaNacimientoInput);
        const hoy = new Date();

        let edad = hoy.getFullYear() - fechaNacimiento.getFullYear();
        const diferenciaMeses = hoy.getMonth() - fechaNacimiento.getMonth();

        if (diferenciaMeses < 0 || (diferenciaMeses === 0 && hoy.getDate() < fechaNacimiento.getDate())) {
            edad--;
        }

        if (edad < 0) edad = 0;

        contenedorEdad.style.display = 'flex';
        textoEdad.innerHTML = `Edad Calculada: <strong>${edad} años</strong>`;
    }

    function validarPasaporte() {
        const inputExpiracion = document.getElementById('expiracion');
        const alertaText = document.getElementById('pasaporteAlerta');
        if (!inputExpiracion.value) return;

        const fechaExpiracion = new Date(inputExpiracion.value);
        const hoy = new Date();

        const limiteSeisMeses = new Date();
        limiteSeisMeses.setMonth(hoy.getMonth() + 6);

        if (fechaExpiracion <= limiteSeisMeses) {
            inputExpiracion.classList.add('passport-danger');
            alertaText.style.display = 'block';
        } else {
            inputExpiracion.classList.remove('passport-danger');
            alertaText.style.display = 'none';
        }
    }

    // MAPEO ABSOLUTO DE VARIABLES PARA ENVÍO TOTAL POR WHATSAPP
    function enviarWhatsApp() {
        // Extracción de Datos Personales
        const nombre = document.getElementById('nombre').value;
        const apellidos = document.getElementById('apellidos').value;
        const email = document.getElementById('email').value;
        const nacimiento = document.getElementById('nacimiento').value;
        const direccion = document.getElementById('direccion').value;
        const edadTexto = document.getElementById('edadTexto').innerText;
        
        // Extracción de Pasaporte e Información Médica
        const pasaporte = document.getElementById('pasaporte').value;
        const expiracion = document.getElementById('expiracion').value;
        const alergias = document.getElementById('alergias').value || "Ninguna";
        const condiciones = document.getElementById('condiciones').value || "Ninguna";

        // Extracción de Contacto de Emergencia
        const nombreEmergencia = document.getElementById('nombreEmergencia').value;
        const telEmergencia = document.getElementById('telEmergencia').value;
        const emailEmergencia = document.getElementById('emailEmergencia').value;

        // Validación preventiva antes de disparar la API
        if(!nombre || !apellidos || !pasaporte || !email || !direccion) {
            alert("Por favor, rellena los campos principales del pasajero antes de enviar por WhatsApp.");
            return;
        }

        // Recopilación de Destinos seleccionados
        let destinos = [];
        document.querySelectorAll('input[name="Destinos[]"]:checked').forEach(cb => {
            destinos.push(cb.value);
        });
        const txtDestinos = destinos.length > 0 ? destinos.join(", ") : "Ninguno seleccionado";

        // Recopilación de Excursiones seleccionadas
        let excursiones = [];
        document.querySelectorAll('input[name="Excursiones[]"]:checked').forEach(cb => {
            excursiones.push(cb.value);
        });
        const txtExcursiones = excursiones.length > 0 ? excursiones.join(", ") : "Ninguna seleccionada";

        // Estructuración limpia del reporte total para la interfaz de chat
        const mensaje = `*✈️ NUEVA SOLICITUD DE VIAJE - PR AROUND THE WORLD*%0A%0A` +
                        `*👤 DATOS PERSONALES:*%0A` +
                        `*▪️ Pasajero:* ${nombre} ${apellidos}%0A` +
                        `*▪️ Correo:* ${email}%0A` +
                        `*▪️ F. Nacimiento:* ${nacimiento} (${edadTexto})%0A` +
                        `*▪️ Dirección:* ${direccion}%0A%0A` +
                        `*🗺️ PREFERENCIAS:*%0A` +
                        `*▪️ Destinos:* ${txtDestinos}%0A` +
                        `*▪️ Excursiones:* ${txtExcursiones}%0A%0A` +
                        `*🆔 PASAPORTE:*%0A` +
                        `*▪️ Número:* ${pasaporte}%0A` +
                        `*▪️ Expiración:* ${expiracion}%0A%0A` +
                        `*🩺 REPORTE MÉDICO:*%0A` +
                        `*▪️ Alergias:* ${alergias}%0A` +
                        `*▪️ Condiciones:* ${condiciones}%0A%0A` +
                        `*🚨 CONTACTO DE EMERGENCIA:*%0A` +
                        `*▪️ Nombre:* ${nombreEmergencia}%0A` +
                        `*▪️ Teléfono:* ${telEmergencia}%0A` +
                        `*▪️ Correo:* ${emailEmergencia}`;
        
        window.open(`https://api.whatsapp.com/send?phone=19392270768&text=${mensaje}`, '_blank');
    }
</script>

</body>
</html>
